<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Judge Verify Console</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --ok: #16a34a;
        --bad: #dc2626;
        --warn: #d97706;
        --line: #374151;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 16px 36px;
      }

      .title {
        margin: 0 0 6px;
        font-size: 26px;
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }

      .toolbar input {
        width: 100%;
        padding: 10px 12px;
        background: #0b1220;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: none;
      }

      .toolbar input:focus {
        border-color: var(--accent);
      }

      .toolbar button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .toolbar button[disabled] {
        opacity: 0.65;
        cursor: wait;
      }

      .status-row {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
        border: 1px solid;
      }

      .badge.ok {
        color: #dcfce7;
        border-color: #166534;
        background: rgba(22, 163, 74, 0.25);
      }

      .badge.bad {
        color: #fee2e2;
        border-color: #7f1d1d;
        background: rgba(220, 38, 38, 0.25);
      }

      .badge.unknown {
        color: #fef3c7;
        border-color: #92400e;
        background: rgba(217, 119, 6, 0.2);
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        margin-top: 8px;
        color: #fecaca;
        background: rgba(220, 38, 38, 0.2);
        border: 1px solid #7f1d1d;
        border-radius: 8px;
        padding: 10px 12px;
        display: none;
      }

      .state-banner {
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        background: rgba(17, 24, 39, 0.85);
      }

      .state-banner.ok {
        border-color: rgba(22, 163, 74, 0.55);
        background: rgba(22, 163, 74, 0.14);
      }

      .state-banner.bad {
        border-color: rgba(220, 38, 38, 0.55);
        background: rgba(220, 38, 38, 0.14);
      }

      .state-banner.unknown {
        border-color: rgba(217, 119, 6, 0.55);
        background: rgba(217, 119, 6, 0.14);
      }

      .state-banner .label {
        display: block;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .state-banner .summary {
        font-size: 14px;
        line-height: 1.45;
      }

      .grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }

      .card h3 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.2px;
        background: var(--panel-2);
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .card .body {
        padding: 10px 12px;
      }

      .checks-table-wrap {
        overflow-x: auto;
      }

      table.checks {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      table.checks th,
      table.checks td {
        padding: 10px 8px;
        border-bottom: 1px solid rgba(55, 65, 81, 0.55);
        text-align: left;
        vertical-align: top;
      }

      table.checks th {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      table.checks td {
        word-break: break-word;
      }

      tr.check-pass {
        background: rgba(22, 163, 74, 0.08);
      }

      tr.check-fail {
        background: rgba(220, 38, 38, 0.1);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid transparent;
      }

      .pill.ok {
        color: #dcfce7;
        border-color: rgba(22, 163, 74, 0.6);
        background: rgba(22, 163, 74, 0.18);
      }

      .pill.bad {
        color: #fee2e2;
        border-color: rgba(220, 38, 38, 0.65);
        background: rgba(220, 38, 38, 0.2);
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      }

      table.kv {
        width: 100%;
        border-collapse: collapse;
      }

      table.kv td {
        border-bottom: 1px solid rgba(55, 65, 81, 0.45);
        vertical-align: top;
        padding: 8px 2px;
        font-size: 13px;
      }

      table.kv td.key {
        color: var(--muted);
        width: 42%;
      }

      table.kv td.value {
        word-break: break-word;
      }

      .bool-true {
        color: #86efac;
        font-weight: 700;
      }

      .bool-false {
        color: #fca5a5;
        font-weight: 700;
      }

      .bool-unknown {
        color: #fcd34d;
        font-weight: 700;
      }

      details {
        margin-top: 12px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
      }

      details > summary {
        cursor: pointer;
        padding: 10px 12px;
        font-weight: 700;
      }

      pre {
        margin: 0;
        padding: 12px;
        border-top: 1px solid var(--line);
        background: #0b1220;
        color: #d1d5db;
        overflow: auto;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">Judge Verify Console</h1>
      <p class="subtitle">Run-level verification view for OpenClaw workflow evidence.</p>

      <div class="toolbar">
        <input id="runIdInput" type="text" placeholder="Enter runId (e.g. demo-http)" />
        <button id="verifyBtn" type="button">Verify</button>
      </div>

      <div class="status-row">
        <div id="verifiedBadge" class="badge unknown">UNKNOWN</div>
        <div id="metaLine" class="meta">No verification requested.</div>
      </div>
      <div id="errorBox" class="error"></div>
      <div id="stateBanner" class="state-banner unknown">
        <span id="stateLabel" class="label">Idle</span>
        <div id="stateSummary" class="summary">Enter a runId to load judge-facing verification evidence.</div>
      </div>

      <div class="grid">
        <section class="card">
          <h3>Expected</h3>
          <div id="expectedBlock" class="body"></div>
        </section>
        <section class="card">
          <h3>Recomputed</h3>
          <div id="recomputedBlock" class="body"></div>
        </section>
        <section class="card">
          <h3>Storage</h3>
          <div id="storageBlock" class="body"></div>
        </section>
        <section class="card">
          <h3>Chain</h3>
          <div id="chainBlock" class="body"></div>
        </section>
        <section class="card">
          <h3>Checks</h3>
          <div id="checksBlock" class="body"></div>
        </section>
      </div>

      <details>
        <summary>Raw JSON</summary>
        <pre id="rawJson">{}</pre>
      </details>
    </div>

    <script>
      (function () {
        var runIdInput = document.getElementById("runIdInput");
        var verifyBtn = document.getElementById("verifyBtn");
        var verifiedBadge = document.getElementById("verifiedBadge");
        var metaLine = document.getElementById("metaLine");
        var errorBox = document.getElementById("errorBox");
        var rawJson = document.getElementById("rawJson");
        var stateBanner = document.getElementById("stateBanner");
        var stateLabel = document.getElementById("stateLabel");
        var stateSummary = document.getElementById("stateSummary");

        function showError(message) {
          if (!message) {
            errorBox.style.display = "none";
            errorBox.textContent = "";
            return;
          }
          errorBox.style.display = "block";
          errorBox.textContent = message;
        }

        function normalizeValue(value) {
          if (value === undefined || value === null || value === "") return "—";
          if (typeof value === "object") return JSON.stringify(value);
          return String(value);
        }

        function boolClass(value) {
          if (value === true) return "bool-true";
          if (value === false) return "bool-false";
          return "bool-unknown";
        }

        function boolText(value) {
          if (value === true) return "true";
          if (value === false) return "false";
          return "unknown";
        }

        function setVerifiedBadge(value) {
          verifiedBadge.className = "badge " + (value === true ? "ok" : value === false ? "bad" : "unknown");
          verifiedBadge.textContent = value === true ? "VERIFIED" : value === false ? "FAILED" : "UNKNOWN";
        }

        function setState(kind, label, summary) {
          stateBanner.className = "state-banner " + (kind || "unknown");
          stateLabel.textContent = label || "Unknown";
          stateSummary.textContent = summary || "No summary available.";
        }

        function renderKV(targetId, source, preferredKeys, booleanMode) {
          var el = document.getElementById(targetId);
          if (!el) return;

          var obj = source && typeof source === "object" ? source : {};
          var keys = Array.isArray(preferredKeys) ? preferredKeys.slice() : [];

          Object.keys(obj).forEach(function (k) {
            if (keys.indexOf(k) === -1) keys.push(k);
          });

          if (keys.length === 0) {
            el.innerHTML = '<div class="meta">No data</div>';
            return;
          }

          var rows = keys
            .filter(function (key) {
              return Object.prototype.hasOwnProperty.call(obj, key);
            })
            .map(function (key) {
              var value = obj[key];
              var rendered = "";
              if (booleanMode && typeof value === "boolean") {
                rendered = '<span class="' + boolClass(value) + '">' + boolText(value) + "</span>";
              } else {
                rendered = escapeHTML(normalizeValue(value));
              }
              return (
                "<tr>" +
                '<td class="key">' +
                escapeHTML(key) +
                "</td>" +
                '<td class="value">' +
                rendered +
                "</td>" +
                "</tr>"
              );
            })
            .join("");

          if (!rows) {
            el.innerHTML = '<div class="meta">No data</div>';
            return;
          }

          el.innerHTML = '<table class="kv"><tbody>' + rows + "</tbody></table>";
        }

        function renderChecks(targetId, checks) {
          var el = document.getElementById(targetId);
          if (!el) return;

          if (!Array.isArray(checks) || checks.length === 0) {
            el.innerHTML = '<div class="meta">No checks returned.</div>';
            return;
          }

          var rows = checks
            .map(function (check, index) {
              var safe = check && typeof check === "object" ? check : {};
              var passed = safe.passed === true;
              var failed = safe.passed === false;
              var rowClass = passed ? "check-pass" : failed ? "check-fail" : "";
              var pillClass = passed ? "ok" : failed ? "bad" : "unknown";
              var pillText = passed ? "PASS" : failed ? "FAIL" : "UNKNOWN";

              return (
                '<tr class="' +
                rowClass +
                '">' +
                "<td>" +
                escapeHTML(safe.name || "check_" + index) +
                "</td>" +
                "<td><span class=\"pill " +
                pillClass +
                '">' +
                pillText +
                "</span></td>" +
                '<td class="mono">' +
                escapeHTML(normalizeValue(safe.expected)) +
                "</td>" +
                '<td class="mono">' +
                escapeHTML(normalizeValue(safe.actual)) +
                "</td>" +
                "<td>" +
                escapeHTML(normalizeValue(safe.message)) +
                "</td>" +
                "</tr>"
              );
            })
            .join("");

          el.innerHTML =
            '<div class="checks-table-wrap">' +
            '<table class="checks">' +
            "<thead><tr><th>Check</th><th>Passed</th><th>Expected</th><th>Actual</th><th>Message</th></tr></thead>" +
            "<tbody>" +
            rows +
            "</tbody></table></div>";
        }

        function escapeHTML(str) {
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function extractPayload(json) {
          if (!json || typeof json !== "object") return {};
          if (json.data && typeof json.data === "object") return json.data;
          return json;
        }

        function render(payload, url) {
          var recomputed = payload.recomputed || payload.recomputedCheckpoint || {};
          var storage = payload.storage || payload.storageCheckpoint || {};
          var chain = payload.chain || payload.onChainCheckpoint || {};
          var failedChecks = Array.isArray(payload.checks)
            ? payload.checks.filter(function (check) {
                return check && check.passed === false;
              })
            : [];

          setVerifiedBadge(payload.verified);
          metaLine.textContent =
            "runId=" +
            normalizeValue(payload.runId) +
            " | workflowId=" +
            normalizeValue(payload.workflowId) +
            " | sessionId=" +
            normalizeValue(payload.sessionId) +
            " | traceId=" +
            normalizeValue(payload.traceId) +
            " | endpoint=" +
            url;

          if (payload.verified === true) {
            setState("ok", "Verification passed", "Recomputed runtime state, storage checkpoint, and chain anchor all match.");
          } else if (payload.verified === false) {
            var headline = failedChecks.length > 0 ? failedChecks[0].name || "verification mismatch" : "verification mismatch";
            setState("bad", "Verification mismatch", "One or more checks failed. Start with: " + headline + ".");
          } else {
            setState("unknown", "Verification unknown", "The response did not provide a conclusive verification result.");
          }

          renderKV(
            "expectedBlock",
            payload.expected,
            ["workflowId", "agentId", "status", "stepIndex", "rootHash", "cid", "txHash"],
            false
          );
          renderKV("recomputedBlock", recomputed, ["workflowId", "agentId", "rootHash", "stepIndex", "status", "error"], false);
          renderKV("storageBlock", storage, ["workflowId", "cid", "rootHash", "stepIndex", "status", "error"], false);
          renderKV("chainBlock", chain, ["workflowIdHash", "cidHash", "rootHash", "stepIndex", "timestamp", "submitter", "error"], false);
          renderChecks("checksBlock", payload.checks);
        }

        async function verify() {
          var runId = (runIdInput.value || "").trim();
          if (!runId) {
            showError("runId is required.");
            return;
          }

          showError("");
          verifyBtn.disabled = true;
          verifyBtn.textContent = "Verifying...";
          setVerifiedBadge(undefined);
          setState("unknown", "Verifying", "Fetching verification evidence from the API.");

          var url = "/v1/openclaw/runs/" + encodeURIComponent(runId) + "/verify";

          try {
            var response = await fetch(url, { headers: { Accept: "application/json" } });
            var bodyText = await response.text();
            var json = {};
            try {
              json = bodyText ? JSON.parse(bodyText) : {};
            } catch (parseErr) {
              throw new Error("response is not valid JSON");
            }

            rawJson.textContent = JSON.stringify(json, null, 2);
            var payload = extractPayload(json);
            render(payload, url);

            if (!response.ok) {
              var msg = (json && (json.error || json.message)) || ("HTTP " + response.status);
              setState("bad", "Request failed", "The verify endpoint returned an error. Check the raw JSON and message below.");
              showError("Request failed: " + msg);
            }
          } catch (err) {
            setState("bad", "Runtime failure", "The browser could not load verification evidence. Confirm the service is running and try again.");
            showError(err && err.message ? err.message : "verification request failed");
            rawJson.textContent = "{}";
          } finally {
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify";
          }
        }

        verifyBtn.addEventListener("click", verify);
        runIdInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") verify();
        });

        var initialRunId = new URLSearchParams(window.location.search).get("runId");
        if (initialRunId) {
          runIdInput.value = initialRunId;
          verify();
        }
      })();
    </script>
  </body>
</html>
